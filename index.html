<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大阪家族旅行 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --primary: #6C63FF;
  --primary-light: #E8E6FF;
  --primary-dark: #524AE0;
  --accent: #FF6B6B;
  --accent-light: #FFE0E0;
  --green: #2ECC71;
  --green-light: #E8F8F0;
  --blue: #3498DB;
  --blue-light: #EBF5FB;
  --orange: #F39C12;
  --orange-light: #FFF3E0;
  --gray: #7F8C8D;
  --gray-light: #F7F8FA;
  --gray-border: #E8E8E8;
  --dark: #2C3E50;
  --white: #FFFFFF;
  --bg: #F4F5F7;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.12);
  --font: 'Segoe UI', 'Hiragino Sans', 'Noto Sans TC', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  padding-bottom: 80px;
  -webkit-tap-highlight-color: transparent;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  padding: 20px 16px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
.header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 4px; }
.header .heart-btn {
  position: absolute;
  right: 16px;
  top: 20px;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

/* Day Tabs */
.day-tabs {
  display: flex;
  gap: 6px;
  padding: 12px 16px 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  border: 2px solid var(--gray-border);
  background: var(--white);
  color: var(--gray);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.day-tab.active {
  background: var(--primary);
  color: var(--white);
  border-color: var(--primary);
}

/* View Toggle */
.view-toggle {
  display: flex;
  gap: 0;
  margin: 8px 16px;
  background: var(--gray-light);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.view-btn {
  flex: 1;
  padding: 8px;
  border: none;
  background: transparent;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--gray);
  transition: all 0.2s;
}
.view-btn.active {
  background: var(--white);
  color: var(--primary);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

/* Content */
.content { padding: 0 16px 16px; }
.content.hidden { display: none; }

/* Spot Card */
.spot-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 4px;
  box-shadow: var(--shadow);
  position: relative;
  transition: all 0.2s;
}
.spot-card.completed { opacity: 0.55; }
.spot-card.completed .spot-name { text-decoration: line-through; }
.spot-card.optional-spot { border-left: 3px solid var(--orange); opacity: 0.85; }
.spot-time {
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 4px;
}
.spot-name {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.spot-tags { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
.spot-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
}
.tag-food { background: #FFF3E0; color: #E65100; }
.tag-sight { background: #E3F2FD; color: #1565C0; }
.tag-temple { background: #FCE4EC; color: #C62828; }
.tag-nature { background: #E8F5E9; color: #2E7D32; }
.tag-shop { background: #F3E5F5; color: #6A1B9A; }
.tag-transport { background: #ECEFF1; color: #455A64; }
.spot-desc {
  font-size: 14px;
  color: var(--gray);
  line-height: 1.5;
  margin-bottom: 8px;
}
.spot-tips {
  background: var(--orange-light);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 13px;
  color: #E65100;
  line-height: 1.5;
  margin-bottom: 8px;
}
.spot-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.spot-actions button {
  flex: 1;
  padding: 8px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--gray-border);
  background: var(--white);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.spot-actions button:active { transform: scale(0.97); }
.spot-check-btn.checked {
  background: var(--green-light);
  border-color: var(--green);
  color: var(--green);
}

/* Connector */
.connector {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  font-size: 13px;
  color: var(--gray);
  line-height: 1.5;
}
.connector::before {
  content: '';
  width: 2px;
  height: 20px;
  background: var(--gray-border);
  flex-shrink: 0;
  margin-left: 8px;
}

/* Start Transit */
.start-transit {
  background: var(--primary-light);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 12px;
  font-size: 13px;
  color: var(--primary-dark);
  line-height: 1.5;
  font-weight: 500;
}

/* Section Card (solo etc) */
.section-card {
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 14px;
  margin-top: 14px;
}
.solo-section {
  background: linear-gradient(135deg, #FFF3E0, #FFF8E1);
  border: 2px solid #FFCC80;
}
.section-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-desc {
  font-size: 13px;
  color: var(--gray);
  line-height: 1.5;
}

/* Group cards (Day 2) */
.group-card {
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
.group-card-a {
  background: linear-gradient(135deg, #E8F5E9, #F1F8E9);
  border: 2px solid #A5D6A7;
}
.group-card-b {
  background: linear-gradient(135deg, #EBF0FA, #E3F2FD);
  border: 2px solid #90CAF9;
}
.group-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.group-subtitle {
  font-size: 14px;
  color: var(--gray);
  line-height: 1.5;
}

/* Optional spot badge */
.spot-optional-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  background: #FFF3E0;
  color: #E65100;
  margin-left: 8px;
  vertical-align: middle;
}

/* Route info box */
.route-info {
  background: var(--blue-light);
  border: 1.5px solid #90CAF9;
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-top: 14px;
  font-size: 14px;
  color: var(--blue);
  line-height: 1.6;
}

/* Note connector */
.note-connector {
  background: var(--gray-light);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-top: 8px;
  font-size: 13px;
  color: var(--gray);
  line-height: 1.5;
  text-align: center;
  font-weight: 500;
}

/* Backup number badge */
.backup-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--orange);
  color: var(--white);
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}

/* Map */
#map {
  height: calc(100vh - 260px);
  min-height: 300px;
  border-radius: var(--radius);
  margin: 0 0 16px;
  z-index: 1;
}

/* Checklist */
.cl-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--gray-border);
}
.cl-item:last-child { border-bottom: none; }
.cl-check {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 2px solid var(--gray-border);
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  transition: all 0.2s;
}
.cl-check.checked {
  background: var(--green);
  border-color: var(--green);
}
.cl-check.checked::after {
  content: '\2713';
  color: var(--white);
  font-size: 14px;
  font-weight: 700;
}
.cl-text { font-size: 14px; line-height: 1.5; flex: 1; }
.cl-text.checked { text-decoration: line-through; color: var(--gray); }
.cl-text a { color: var(--primary); text-decoration: underline; }

/* Progress Ring */
.progress-ring-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0;
}
.progress-ring { transform: rotate(-90deg); }
.progress-ring-bg { fill: none; stroke: var(--gray-border); stroke-width: 8; }
.progress-ring-fill { fill: none; stroke: var(--green); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.5s; }
.progress-text { font-size: 14px; font-weight: 600; margin-top: 8px; color: var(--dark); }

/* Expense Tracker */
.exp-summary {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  text-align: center;
}
.exp-total { font-size: 28px; font-weight: 700; color: var(--primary); }
.exp-total-sub { font-size: 14px; color: var(--gray); margin-top: 4px; }
.exp-form {
  background: var(--white);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  overflow: hidden;
}
.exp-input, .exp-select {
  padding: 10px 12px;
  border: 1.5px solid var(--gray-border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font);
  min-width: 0;
}
.exp-input:focus, .exp-select:focus {
  outline: none;
  border-color: var(--primary);
}
.exp-input-amount { width: 100px; }
.exp-input-note { flex: 1; min-width: 120px; }
.exp-select { width: 90px; min-width: 0; }
.exp-add-btn {
  padding: 10px 18px;
  background: var(--primary);
  color: var(--white);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.exp-list { display: flex; flex-direction: column; gap: 8px; }
.exp-item {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 12px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 10px;
}
.exp-item-icon { font-size: 20px; flex-shrink: 0; }
.exp-item-body {
  flex: 1;
  overflow: hidden;
}
.exp-item-note { font-size: 14px; font-weight: 600; }
.exp-item-meta {
  font-size: 12px;
  color: var(--gray);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.exp-item-jpy {
  font-size: 16px;
  font-weight: 700;
  color: var(--dark);
  text-align: right;
  white-space: nowrap;
}
.exp-item-twd {
  font-size: 12px;
  color: var(--gray);
  text-align: right;
  white-space: nowrap;
}
.exp-item-del {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--accent);
  padding: 4px;
  flex-shrink: 0;
}
.exp-day-filter {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.exp-day-filter::-webkit-scrollbar { display: none; }
.exp-day-btn {
  padding: 6px 12px;
  border-radius: 16px;
  border: 1.5px solid var(--gray-border);
  background: var(--white);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.exp-day-btn.active {
  background: var(--primary);
  color: var(--white);
  border-color: var(--primary);
}
.exp-rate-note {
  text-align: center;
  font-size: 12px;
  color: var(--gray);
  margin-top: 12px;
}

/* Google Sheets Sync */
.sync-section {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.sync-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sync-desc {
  font-size: 13px;
  color: var(--gray);
  line-height: 1.5;
  margin-bottom: 12px;
}
.sync-url-input {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--gray-border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: var(--font);
  margin-bottom: 8px;
  min-width: 0;
}
.sync-url-input:focus { outline: none; border-color: var(--primary); }
.sync-btn {
  width: 100%;
  padding: 10px;
  background: #0F9D58;
  color: var(--white);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.sync-btn:disabled { opacity: 0.5; }
.sync-status {
  font-size: 12px;
  margin-top: 8px;
  text-align: center;
}
.sync-status.success { color: var(--green); }
.sync-status.error { color: var(--accent); }
.sync-instructions {
  background: var(--gray-light);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-top: 12px;
  font-size: 12px;
  color: var(--gray);
  line-height: 1.6;
}
.sync-instructions summary {
  cursor: pointer;
  font-weight: 600;
  color: var(--dark);
  margin-bottom: 8px;
}
.sync-instructions code {
  background: #E8E8E8;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
}

/* Info page sections */
.info-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.info-card h3 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Cafe card */
.cafe-card {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.cafe-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.cafe-desc { font-size: 13px; color: var(--gray); line-height: 1.4; margin-bottom: 6px; }
.cafe-link {
  font-size: 12px;
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}

/* Walking distance */
.walking-info {
  background: var(--green-light);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 12px;
  color: #2E7D32;
  text-align: center;
  margin: 8px 0;
}

/* Bottom Bar */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--white);
  border-top: 1px solid var(--gray-border);
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  z-index: 100;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
}
.bar-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: none;
  border: none;
  font-size: 10px;
  color: var(--gray);
  cursor: pointer;
  padding: 4px 8px;
  font-family: var(--font);
}
.bar-btn .bar-icon { font-size: 20px; }
.bar-btn.active { color: var(--primary); }

/* Reset modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-overlay.hidden { display: none; }
.modal-box {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 300px;
  width: 90%;
  text-align: center;
  box-shadow: var(--shadow-lg);
}
.modal-box h3 { margin-bottom: 12px; }
.modal-box p { font-size: 14px; color: var(--gray); margin-bottom: 16px; }
.modal-btns { display: flex; gap: 10px; }
.modal-btns button {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.modal-cancel { background: var(--gray-light); color: var(--dark); }
.modal-confirm { background: var(--accent); color: var(--white); }
</style>
</head>
<body>

<div class="header">
  <h1>🌸 大阪家族旅行 2026</h1>
  <div class="subtitle">5/8 (五) ~ 5/12 (二) · 5 天 4 夜</div>
  <button class="heart-btn" id="heartBtn">🤍</button>
</div>

<div class="day-tabs" id="dayTabs"></div>

<div id="viewToggle" class="view-toggle" style="display:none;">
  <button class="view-btn active" data-view="list" onclick="setView('list')">📋 列表</button>
  <button class="view-btn" data-view="map" onclick="setView('map')">🗺️ 地圖</button>
</div>

<div class="content" id="mainContent"></div>

<div class="bottom-bar">
  <button class="bar-btn active" data-page="itinerary" onclick="switchPage('itinerary')">
    <span class="bar-icon">📅</span>行程
  </button>
  <button class="bar-btn" data-page="info" onclick="switchPage('info')">
    <span class="bar-icon">📌</span>資訊
  </button>
  <button class="bar-btn" data-page="backup" onclick="switchPage('backup')">
    <span class="bar-icon">🔄</span>備案
  </button>
  <button class="bar-btn" data-page="todo" onclick="switchPage('todo')">
    <span class="bar-icon">📋</span>待辦
  </button>
  <button class="bar-btn" data-page="expense" onclick="switchPage('expense')">
    <span class="bar-icon">💰</span>記帳
  </button>
  <button class="bar-btn" data-page="reset" onclick="showResetModal()">
    <span class="bar-icon">🔄</span>重置
  </button>
</div>

<div class="modal-overlay hidden" id="resetModal">
  <div class="modal-box">
    <h3>重置所有資料？</h3>
    <p>將清除所有打卡記錄、記帳資料和勾選狀態，無法復原。</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="hideResetModal()">取消</button>
      <button class="modal-confirm" onclick="doReset()">確認重置</button>
    </div>
  </div>
</div>

<script>
// ========== DATA ==========
var DAYS_DATA = [
  {
    id: 'day1',
    label: 'Day1',
    date: '5/8 五',
    title: '抵達大阪',
    subtitle: '全員同行',
    startTransit: null,
    spots: [

function loadState() {
  try {
    return JSON.parse(localStorage.getItem('osakaTrip2026') || '{}');
  } catch(e) { return {}; }
}
function saveState() {
  state.secretUnlocked = secretUnlocked;
  localStorage.setItem('osakaTrip2026', JSON.stringify(state));
}
function getChecked(key) { return state[key] || false; }
function setChecked(key, val) { state[key] = val; saveState(); }

// ========== HEART / SECRET ==========
var heartTimer = null;
var heartBtn = document.getElementById('heartBtn');
var tapCount = 0;
var tapTimer = null;

heartBtn.addEventListener('touchstart', function(e) {
  e.preventDefault();
  startHeartPress();
}, { passive: false });
heartBtn.addEventListener('mousedown', function() { startHeartPress(); });
heartBtn.addEventListener('touchend', function() { endHeartPress(); });
heartBtn.addEventListener('mouseup', function() { endHeartPress(); });
heartBtn.addEventListener('click', function() {
  if (secretUnlocked) {
    tapCount++;
    if (tapCount === 3) {
      secretUnlocked = false;
      saveState();
      tapCount = 0;
      updateHeartIcon();
      renderCurrentPage();
    }
    clearTimeout(tapTimer);
    tapTimer = setTimeout(function() { tapCount = 0; }, 600);
  }
});

function startHeartPress() {
  heartTimer = setTimeout(function() {
    secretUnlocked = true;
    saveState();
    updateHeartIcon();
    renderCurrentPage();
  }, 1500);
}
function endHeartPress() { clearTimeout(heartTimer); }
function updateHeartIcon() { heartBtn.textContent = secretUnlocked ? '❤️' : '🤍'; }
updateHeartIcon();

// ========== TABS ==========
function renderDayTabs() {
  var tabs = document.getElementById('dayTabs');
  var html = '';
  for (var i = 0; i < DAYS_DATA.length; i++) {
    var d = DAYS_DATA[i];
    html += '<button class="day-tab ' + (i === currentDay ? 'active' : '') + '" onclick="selectDay(' + i + ')">' + d.label + '<br><span style="font-size:11px;font-weight:400">' + d.date + '</span></button>';
  }
  tabs.innerHTML = html;
}

function selectDay(i) {
  currentDay = i;
  renderDayTabs();
  renderCurrentPage();
}

// ========== PAGE SWITCH ==========
function switchPage(page) {
  currentPage = page;
  var btns = document.querySelectorAll('.bar-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].dataset.page === page);
  }
  var dayTabsEl = document.getElementById('dayTabs');
  var viewToggleEl = document.getElementById('viewToggle');
  if (page === 'itinerary') {
    dayTabsEl.style.display = 'flex';
    viewToggleEl.style.display = 'flex';
  } else {
    dayTabsEl.style.display = 'none';
    viewToggleEl.style.display = 'none';
  }
  renderCurrentPage();
}

function setView(v) {
  currentView = v;
  var btns = document.querySelectorAll('.view-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].dataset.view === v);
  }
  renderCurrentPage();
}

function renderCurrentPage() {
  var el = document.getElementById('mainContent');
  switch (currentPage) {
    case 'itinerary': renderItinerary(el); break;
    case 'info': renderInfo(el); break;
    case 'backup': renderBackup(el); break;
    case 'todo': renderTodo(el); break;
    case 'expense': renderExpense(el); break;
  }
}

// ========== ESCAPE HTML ==========
function escapeAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ========== RENDER SPOT CARD ==========
function spotCardHTML(spot, dayId, idx, prefix) {
  var key = (prefix || dayId) + '_spot_' + idx;
  var checked = getChecked(key);
  var isOptional = spot.optional;
  var html = '<div class="spot-card ' + (checked ? 'completed' : '') + ' ' + (isOptional ? 'optional-spot' : '') + '">';
  if (spot.time) html += '<div class="spot-time">' + spot.time + '</div>';
  html += '<div class="spot-name">' + spot.name;
  if (isOptional) html += '<span class="spot-optional-badge">選配</span>';
  html += '</div>';
  if (spot.tags && spot.tags.length) {
    html += '<div class="spot-tags">';
    for (var t = 0; t < spot.tags.length; t++) {
      var tm = TAG_MAP[spot.tags[t]];
      if (tm) html += '<span class="spot-tag ' + tm.cls + '">' + tm.label + '</span>';
    }
    html += '</div>';
  }
  if (spot.desc) html += '<div class="spot-desc">' + spot.desc + '</div>';
  if (spot.tips) html += '<div class="spot-tips">💡 ' + spot.tips + '</div>';
  html += '<div class="spot-actions">';
  html += '<button class="spot-check-btn ' + (checked ? 'checked' : '') + '" onclick="toggleSpot(\'' + key + '\')">✓ ' + (checked ? '已完成' : '打卡') + '</button>';
  if (spot.lat && spot.lng) {
    html += '<button onclick="window.open(\'https://maps.google.com/?q=' + spot.lat + ',' + spot.lng + '\',\'_blank\')">📍 地圖</button>';
  }
  html += '</div></div>';
  if (spot.transitToNext) {
    html += '<div class="connector">' + spot.transitToNext + '</div>';
  }
  return html;
}

function toggleSpot(key) {
  setChecked(key, !getChecked(key));
  renderCurrentPage();
}

// ========== MAP ==========
function initMap() {
  var mapEl = document.getElementById('map');
  if (!mapEl) return;
  if (map) { map.remove(); map = null; }
  map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);
  markers = [];
  var spots = [];
  var day = DAYS_DATA[currentDay];
  if (day.isDay2) {
    spots = day.groupB.spots;
  } else {
    spots = day.spots;
  }
  var validSpots = [];
  for (var i = 0; i < spots.length; i++) {
    if (spots[i].lat && spots[i].lng) validSpots.push(spots[i]);
  }
  if (validSpots.length === 0) {
    map.setView([34.6937, 135.5023], 12);
    return;
  }
  var bounds = [];
  for (var i = 0; i < validSpots.length; i++) {
    var s = validSpots[i];
    var m = L.marker([s.lat, s.lng]).addTo(map)
      .bindPopup('<b>' + s.name + '</b>' + (s.desc ? '<br>' + s.desc : ''));
    markers.push(m);
    bounds.push([s.lat, s.lng]);
  }
  if (bounds.length === 1) {
    map.setView(bounds[0], 15);
  } else {
    map.fitBounds(bounds, { padding: [40, 40] });
  }
  // Walking distance via OSRM
  if (validSpots.length >= 2) {
    var coords = '';
    for (var i = 0; i < validSpots.length; i++) {
      if (i > 0) coords += ';';
      coords += validSpots[i].lng + ',' + validSpots[i].lat;
    }
    fetch('https://router.project-osrm.org/route/v1/foot/' + coords + '?overview=false')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.routes && data.routes[0]) {
          var dist = data.routes[0].distance;
          var dur = data.routes[0].duration;
          var walkEl = document.getElementById('walkingInfo');
          if (walkEl) {
            walkEl.style.display = 'block';
            walkEl.innerHTML = '🚶 今日步行總距離約 ' + (dist / 1000).toFixed(1) + ' km，約 ' + Math.round(dur / 60) + ' 分鐘';
          }
        }
      })
      .catch(function() {});
  }
}

function countAllSpots() {
  var c = 0;
  for (var d = 0; d < DAYS_DATA.length; d++) {
    var day = DAYS_DATA[d];
    if (day.isDay2) {
      c += day.groupB.spots.length;
    } else {
      c += day.spots.length;
    }
  }
  return c;
}

function countDoneSpots() {
  var c = 0;
  for (var d = 0; d < DAYS_DATA.length; d++) {
    var day = DAYS_DATA[d];
    if (day.isDay2) {
      for (var i = 0; i < day.groupB.spots.length; i++) {
        if (getChecked(day.id + '_groupB_spot_' + i)) c++;
      }
    } else {
      for (var i = 0; i < day.spots.length; i++) {
        if (getChecked(day.id + '_spot_' + i)) c++;
      }
    }
  }
  return c;
}

// ========== EXPENSE ==========
function getExpenses() {
  return state.expenses || [];
}
function setExpenses(list) {
  state.expenses = list;
  saveState();
}

function renderExpense(el) {
  var expenses = getExpenses();
  var totalJPY = 0;
  for (var i = 0; i < expenses.length; i++) totalJPY += expenses[i].amount;
  var totalTWD = Math.round(totalJPY * JPY_TO_TWD);

  var html = '<div class="exp-summary">';
  html += '<div class="exp-total">&yen;' + totalJPY.toLocaleString() + '</div>';
  html += '<div class="exp-total-sub">&asymp; NT$' + totalTWD.toLocaleString() + '</div>';
  html += '</div>';

  // Day filter
  var allDays = ['全部'];
  for (var i = 0; i < DAYS_DATA.length; i++) allDays.push(DAYS_DATA[i].label);
  var filterDay = state.expFilterDay || '全部';
  html += '<div class="exp-day-filter">';
  for (var i = 0; i < allDays.length; i++) {
    html += '<button class="exp-day-btn ' + (filterDay === allDays[i] ? 'active' : '') + '" onclick="setExpFilter(\'' + allDays[i] + '\')">' + allDays[i] + '</button>';
  }
  html += '</div>';

  // Add form
  html += '<div class="exp-form">';
  html += '<input class="exp-input exp-input-amount" type="number" placeholder="金額 &yen;" id="expAmount">';
  html += '<select class="exp-select" id="expCat">';
  html += '<option value="food">🍽️ 餐飲</option>';
  html += '<option value="transport">🚃 交通</option>';
  html += '<option value="shop">🛍️ 購物</option>';
  html += '<option value="ticket">🎟️ 門票</option>';
  html += '<option value="other">📦 其他</option>';
  html += '</select>';
  html += '<select class="exp-select" id="expDay">';
  for (var i = 0; i < DAYS_DATA.length; i++) {
    html += '<option value="' + DAYS_DATA[i].label + '">' + DAYS_DATA[i].label + '</option>';
  }
  html += '</select>';
  html += '<input class="exp-input exp-input-note" type="text" placeholder="備註" id="expNote">';
  html += '<button class="exp-add-btn" onclick="addExpense()">新增</button>';
  html += '</div>';

  // Sync section
  html += renderSyncSection();

  // Filtered list
  var filtered = [];
  for (var i = 0; i < expenses.length; i++) {
    if (filterDay === '全部' || expenses[i].day === filterDay) filtered.push({ exp: expenses[i], origIdx: i });
  }
  html += '<div class="exp-list">';
  for (var ri = filtered.length - 1; ri >= 0; ri--) {
    var e = filtered[ri].exp;
    var origIdx = filtered[ri].origIdx;
    html += '<div class="exp-item">';
    html += '<div class="exp-item-icon">' + (CAT_ICONS[e.cat] || '📦') + '</div>';
    html += '<div class="exp-item-body">';
    html += '<div class="exp-item-note">' + (e.note || '（無備註）') + '</div>';
    html += '<div class="exp-item-meta">' + e.day + ' · ' + (e.catLabel || e.cat) + '</div>';
    html += '</div>';
    html += '<div style="text-align:right;">';
    html += '<div class="exp-item-jpy">&yen;' + e.amount.toLocaleString() + '</div>';
    html += '<div class="exp-item-twd">&asymp; NT$' + Math.round(e.amount * JPY_TO_TWD).toLocaleString() + '</div>';
    html += '</div>';
    html += '<button class="exp-item-del" onclick="delExpense(' + origIdx + ')">✕</button>';
    html += '</div>';
  }
  html += '</div>';
  html += '<div class="exp-rate-note">匯率 1 JPY &asymp; ' + JPY_TO_TWD + ' TWD（僅供參考）</div>';
  el.innerHTML = html;
}

function addExpense() {
  var amount = parseInt(document.getElementById('expAmount').value);
  if (!amount || amount <= 0) return;
  var cat = document.getElementById('expCat').value;
  var catLabels = { food: '餐飲', transport: '交通', shop: '購物', ticket: '門票', other: '其他' };
  var note = document.getElementById('expNote').value;
  var day = document.getElementById('expDay').value;
  var exps = getExpenses();
  exps.push({ amount: amount, cat: cat, catLabel: catLabels[cat], note: note, day: day, ts: Date.now() });
  setExpenses(exps);
  renderCurrentPage();
}

function delExpense(idx) {
  var exps = getExpenses();
  exps.splice(idx, 1);
  setExpenses(exps);
  renderCurrentPage();
}

function setExpFilter(d) {
  state.expFilterDay = d;
  saveState();
  renderCurrentPage();
}

// ========== GOOGLE SHEETS SYNC ==========
function renderSyncSection() {
  var url = state.sheetsUrl || '';
  var html = '<div class="sync-section">';
  html += '<div class="sync-title">📊 同步到 Google Sheets</div>';
  html += '<div class="sync-desc">將記帳資料同步到 Google Sheets，方便分帳和統計。</div>';
  html += '<input class="sync-url-input" type="text" placeholder="貼上 Apps Script Web App URL" id="syncUrl" value="' + escapeAttr(url) + '">';
  html += '<button class="sync-btn" onclick="syncToSheets()" id="syncBtn">同步</button>';
  html += '<div class="sync-status" id="syncStatus"></div>';
  html += '<details class="sync-instructions">';
  html += '<summary>如何設定 Google Sheets 同步？</summary>';
  html += '<ol>';
  html += '<li>開一個新的 Google Sheet</li>';
  html += '<li>點選「擴充功能 → Apps Script」</li>';
  html += '<li>貼上以下程式碼：</li>';
  html += '</ol>';
  html += '<pre style="font-size:11px;overflow-x:auto;background:#f0f0f0;padding:8px;border-radius:6px;margin:8px 0;"><code>function doPost(e) {\n';
  html += '  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();\n';
  html += '  var data = JSON.parse(e.postData.contents);\n';
  html += '  if (data.clear) {\n';
  html += '    sheet.clear();\n';
  html += '    sheet.appendRow([\'日期\',\'分類\',\'金額(JPY)\',\'金額(TWD)\',\'備註\',\'時間戳\']);\n';
  html += '  }\n';
  html += '  data.expenses.forEach(function(exp) {\n';
  html += '    sheet.appendRow([\n';
  html += '      exp.day,\n';
  html += '      exp.catLabel || exp.cat,\n';
  html += '      exp.amount,\n';
  html += '      Math.round(exp.amount * 0.22),\n';
  html += '      exp.note || \'\',\n';
  html += '      new Date(exp.ts).toLocaleString(\'zh-TW\')\n';
  html += '    ]);\n';
  html += '  });\n';
  html += '  return ContentService\n';
  html += '    .createTextOutput(JSON.stringify({status:\'ok\'}))\n';
  html += '    .setMimeType(ContentService.MimeType.JSON);\n';
  html += '}</code></pre>';
  html += '<ol start="4">';
  html += '<li>部署為「Web App」，權限選「任何人」</li>';
  html += '<li>將部署的 URL 貼到上方輸入框</li>';
  html += '</ol>';
  html += '</details>';
  html += '</div>';
  return html;
}

function syncToSheets() {
  var url = document.getElementById('syncUrl').value.trim();
  if (!url) {
    showSyncStatus('請先貼上 Apps Script URL', 'error');
    return;
  }
  state.sheetsUrl = url;
  saveState();
  var btn = document.getElementById('syncBtn');
  btn.disabled = true;
  btn.textContent = '同步中...';
  var expenses = getExpenses();
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ clear: true, expenses: expenses })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.status === 'ok') {
      showSyncStatus('✓ 已同步 ' + expenses.length + ' 筆資料', 'success');
    } else {
      showSyncStatus('同步失敗，請檢查 URL', 'error');
    }
  })
  .catch(function(err) {
    showSyncStatus('同步失敗: ' + err.message, 'error');
  })
  .finally(function() {
    btn.disabled = false;
    btn.textContent = '同步';
  });
}

function showSyncStatus(msg, type) {
  var el = document.getElementById('syncStatus');
  if (el) {
    el.textContent = msg;
    el.className = 'sync-status ' + type;
  }
}
